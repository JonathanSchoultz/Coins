# =============================================================================
# Coin Database
# =============================================================================
# Each coin is identified by its NFC tag UID.
# Status is determined by the 'expires' field:
#   - If 'expires' is in the past -> EXPIRED (flash red + error sound)
#   - If 'expires' is in the future or null (never expires) -> READY
#   - If UID is not in this file -> UNKNOWN (flash red + error sound)
#
# Actions are executed in order when a coin is READY.
# Available action types:
#   - led_pattern:   Play a light pattern on the LED strip
#   - play_sound:    Play a sound file on the local speaker
#   - sonos_play:    Play music on Sonos
#   - sonos_control: Control Sonos playback (volume, pause, skip, etc.)
#   - send_message:  Send a WhatsApp or SMS message
#   - wait:          Pause between actions (seconds)
# =============================================================================

